name: Deploy ai-kb to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'ai-kb/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy AI Knowledge Base
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: 'ai-kb'
