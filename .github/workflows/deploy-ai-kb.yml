name: Deploy ai-kb to Cloudflare Workers

# Cloudflare's native Git integration also builds the ai-kb worker but
# picks up the wrong entry point (the root b24-catalog wrangler.toml
# and assets), which overwrites this worker with the catalog UI.
# This workflow intentionally runs AFTER the native CI finishes and
# restores the correct ai-kb code & assets from the subdirectory.

on:
  push:
    # Any push to main triggers a redeploy — Cloudflare's native Git
    # integration clobbers ai-kb on any merge (not just ai-kb/** ones),
    # so we always re-assert the correct build. Only scheduled runs
    # short-circuit when the worker is already healthy.
    branches: [main]
  schedule:
    # Safety net: run every 15 min in case a push slipped through or
    # failed, or a webhook didn't fire.
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-ai-kb-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy AI Knowledge Base
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check current deploy and decide if redeploy needed
        id: check
        run: |
          # On push + manual dispatch: always redeploy so fresh code ships.
          # On schedule: only redeploy if the root isn't serving Бот Эверест.
          if [[ "${{ github.event_name }}" != 'schedule' ]]; then
            echo "redeploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          title=$(curl -sf https://ai-kb.35ewerest.workers.dev/ | grep -oE '<title>[^<]+</title>' | head -1 || true)
          echo "current title: $title"
          if [[ "$title" == '<title>Бот Эверест</title>' ]]; then
            echo "redeploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "redeploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify CF_API_TOKEN has required scopes
        if: steps.check.outputs.redeploy == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ACC: '84cbacc4816c29c294101ec57a0bea5d'
        run: |
          set -e
          if [[ -z "$CF_API_TOKEN" ]]; then
            echo "::error::CF_API_TOKEN secret is not set in this repository"
            exit 1
          fi
          # Account-scoped tokens fail /user/tokens/verify with code 1000
          # even when valid; use the account-scoped endpoint instead.
          verify=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$ACC/tokens/verify" -H "Authorization: Bearer $CF_API_TOKEN")
          echo "Token verify: $verify"
          echo "$verify" | grep -q '"success":true' || { echo "::error::CF_API_TOKEN is invalid or not scoped to account $ACC"; exit 1; }
          # Touch the ai-kb service to fail fast if the token lacks
          # Workers Scripts:Read/Edit on this account.
          ai=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$ACC/workers/services/ai-kb/environments/production" -H "Authorization: Bearer $CF_API_TOKEN")
          if echo "$ai" | grep -q '"code":10000'; then
            echo "::error::CF_API_TOKEN lacks Workers Scripts edit permission on account $ACC. Recreate the token with permissions: Workers Scripts:Edit, Workers AI:Edit, D1:Edit, R2:Edit, Vectorize:Edit, Account Settings:Read."
            exit 1
          fi

      - name: Install wrangler
        if: steps.check.outputs.redeploy == 'true'
        run: npm i -g wrangler@4.83.0

      - name: Deploy and win the race against Cloudflare native CI
        if: steps.check.outputs.redeploy == 'true'
        working-directory: ai-kb
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 84cbacc4816c29c294101ec57a0bea5d
          EXPECTED_TITLE: '<title>Бот Эверест</title>'
        run: |
          set -e
          # Cloudflare's native Git integration triggers its own build
          # on every push and that build finishes somewhere between
          # 1.5 and 5 minutes in. We deploy, wait, verify, and redeploy
          # until our build stays. Up to 6 attempts with growing waits.
          attempt=0
          max_attempts=6
          stable=false
          while [ "$attempt" -lt "$max_attempts" ]; do
            attempt=$((attempt+1))
            echo "::group::Attempt $attempt — wrangler deploy"
            wrangler deploy
            echo "::endgroup::"

            # Wait for CF edge to propagate AND for any native CI that's
            # still running to finish overwriting us.
            settle=$((30 + attempt * 30))
            echo "settling for ${settle}s before verify"
            sleep "$settle"

            title=$(curl -sf https://ai-kb.35ewerest.workers.dev/ 2>/dev/null | grep -oE '<title>[^<]+</title>' | head -1 || true)
            echo "post-settle title: $title"
            if [[ "$title" != "$EXPECTED_TITLE" ]]; then
              echo "worker was overwritten by native CI, retrying…"
              continue
            fi

            # Double-check: wait another 60s to ensure the deploy sticks.
            sleep 60
            title2=$(curl -sf https://ai-kb.35ewerest.workers.dev/ 2>/dev/null | grep -oE '<title>[^<]+</title>' | head -1 || true)
            echo "stability check title: $title2"
            if [[ "$title2" == "$EXPECTED_TITLE" ]]; then
              stable=true
              break
            fi
            echo "deploy didn't stick after 60s, retrying…"
          done

          if [[ "$stable" != "true" ]]; then
            echo "::error::Could not win the race against Cloudflare native CI after $max_attempts attempts"
            exit 1
          fi
          echo "ai-kb is stable after $attempt attempts"

      - name: Final smoke check (api/health)
        if: steps.check.outputs.redeploy == 'true'
        run: |
          body=$(curl -sf https://ai-kb.35ewerest.workers.dev/api/health)
          echo "$body"
          echo "$body" | grep -q 'llama-3.3-70b' || { echo "::error::health did not report llama-3.3-70b"; exit 1; }
