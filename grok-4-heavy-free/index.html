<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok 4 Heavy Free</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            z-index: 1000;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div id="loading">Please wait, loading...</div>
    <iframe id="streamlit-frame"></iframe>

    <script>
    const SERVER_URL = "https://balianone-iy6vtfcc5aphp7b6mrjjqv.streamlit.app/?embed=true";

    window.onload = () => {
        const loadingElement = document.getElementById('loading');
        const iframe = document.getElementById('streamlit-frame');

        const cacheBuster = Date.now();
        const separator = SERVER_URL.includes('?') ? '&' : '?';
        iframe.src = `${SERVER_URL}${separator}cb=${cacheBuster}`;

        iframe.onload = () => {
            loadingElement.style.display = 'none';
        };
    };
    </script>
</body>
</html>
