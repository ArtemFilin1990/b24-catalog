<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#C74326" />
  <title>Бот Эверест</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header" id="main-header">
    <div class="header-top">
      <button id="back-btn" class="header-btn" type="button" aria-label="Назад" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <span class="header-btn" style="visibility:hidden"></span>
      <button id="menu-btn" class="header-btn" type="button" aria-label="Меню">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="5" r="2"/>
          <circle cx="12" cy="12" r="2"/>
          <circle cx="12" cy="19" r="2"/>
        </svg>
      </button>
    </div>

    <div class="header-center">
      <div class="logo-circle" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="24" cy="24" r="20"/>
          <path d="M8 30 L18 18 L23 24 L31 14 L40 30 Z" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div class="header-title" id="header-title">Бот Эверест</div>
      <div class="header-sub" id="header-sub">В сети</div>
      <div class="header-stats" id="stats"></div>
    </div>
  </header>

  <div class="sheet-overlay" id="sheet-overlay"></div>
  <div class="sheet" id="menu-sheet" role="menu">
    <button type="button" data-action="kb" role="menuitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14zM4 19.5V21h14"/>
      </svg>
      База знаний
    </button>
    <button type="button" data-action="clear" role="menuitem" class="danger">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      </svg>
      Очистить чат
    </button>
  </div>

  <main id="view-chat" class="view active">
    <div class="chat" id="chat" aria-live="polite"></div>

    <div class="composer">
      <div class="composer-inner">
        <div class="attached-list" id="attached-list"></div>

        <form id="form" class="form">
          <button id="attach-btn" type="button" class="round-btn" title="Прикрепить файл" aria-label="Прикрепить">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l8.57-8.57a4 4 0 0 1 5.66 5.66l-8.58 8.58a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <input id="attach-input" type="file" multiple hidden />

          <button id="mic-btn" type="button" class="round-btn mic" title="Голосовой ввод" aria-label="Голосовой ввод">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="3" width="6" height="12" rx="3"/>
              <path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>
            </svg>
          </button>

          <div class="input-wrap">
            <textarea
              id="input"
              class="input"
              rows="1"
              placeholder="Написать сообщение…"
              autocomplete="off"
            ></textarea>
          </div>

          <button id="send" type="submit" class="round-btn" title="Отправить" aria-label="Отправить">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M5 4v16l15-8z"/>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </main>

  <main id="view-upload" class="view">
    <section class="upload-shell">
      <button type="button" class="upload-back" id="kb-back">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Назад к чату
      </button>
      <h2>База знаний</h2>
      <p class="muted">Загрузите документ в любом формате. Поддерживается извлечение текста из PDF и DOCX в браузере; остальные форматы принимаются как plain text. После индексации чат будет использовать эти данные в ответах.</p>

      <label class="field">
        <span>Заголовок</span>
        <input id="doc-title" type="text" placeholder="Например: ГОСТ 520-2011 — допуски и посадки" />
      </label>

      <label class="field">
        <span>Категория</span>
        <select id="doc-category">
          <option value="gost">ГОСТ / стандарт</option>
          <option value="manual">Инструкция / мануал</option>
          <option value="docs" selected>Документация</option>
          <option value="faq">FAQ / вопросы</option>
          <option value="other">Другое</option>
        </select>
      </label>

      <label class="field">
        <span>Токен администратора</span>
        <input id="admin-token" type="password" placeholder="X-Admin-Token" autocomplete="current-password" />
      </label>

      <div class="field">
        <span>Файл</span>
        <div class="file-drop">
          <input id="doc-file" type="file" />
        </div>
        <textarea id="doc-text" rows="10" placeholder="…или вставьте текст вручную"></textarea>
      </div>

      <div class="upload-actions">
        <button id="upload-btn" type="button" class="primary-btn">Загрузить в базу</button>
        <button id="reindex-btn" type="button" class="ghost-btn" title="Переиндексировать все записи knowledge_base">Переиндексировать</button>
      </div>

      <div id="upload-status" class="upload-status" hidden></div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
