<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Помощник — ТД Эверест</title>
<style>
  :root {
    --accent: #ff9500;
    --accent-dark: #e08500;
    --bg: #f0f4f8;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #94a3b8;
    --user-bg: #ff9500;
    --bot-bg: #ffffff;
    --shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 760px; margin: 0 auto; }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .logo {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; font-size: 12px; letter-spacing: -.5px;
    flex-shrink: 0;
  }
  .header-text h1 { font-size: 15px; font-weight: 700; }
  .header-text p { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .status {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #059669; font-weight: 500;
    background: #d1fae5; border-radius: 20px; padding: 4px 10px;
    flex-shrink: 0;
  }
  .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #059669; flex-shrink: 0; }

  /* Chat */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Messages */
  .msg-wrap { display: flex; gap: 8px; align-items: flex-end; }
  .msg-wrap.user { flex-direction: row-reverse; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }
  .avatar.bot { background: var(--accent); color: #fff; }
  .avatar.user-av { background: #334155; color: #fff; }
  .bubble {
    max-width: 75%;
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    box-shadow: 0 1px 3px rgba(0,0,0,.07);
  }
  .bubble.bot {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .bubble.user {
    background: var(--user-bg);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble .sources {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .typing-dots {
    display: flex; gap: 4px; align-items: center; padding: 4px 0;
  }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
    animation: bounce .8s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .15s; }
  .typing-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  /* Suggestions */
  .suggestions {
    padding: 0 16px 10px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 13px;
    font-size: 12px;
    color: #475569;
    cursor: pointer;
    transition: .15s;
    white-space: nowrap;
  }
  .suggestion:hover { border-color: var(--accent); color: var(--accent); background: #fff7ed; }

  /* Input */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .input-wrap { flex: 1; position: relative; }
  textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 13.5px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.45;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color .15s;
    background: #f8fafc;
  }
  textarea:focus { border-color: var(--accent); background: #fff; }
  textarea::placeholder { color: var(--muted); }
  .send-btn {
    width: 42px; height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: .15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent-dark); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 32px 20px;
    color: var(--muted);
  }
  .welcome .icon { font-size: 40px; margin-bottom: 12px; }
  .welcome h2 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .welcome p { font-size: 13px; max-width: 380px; margin: 0 auto; }

  /* Error */
  .error-msg {
    background: #fee2e2; border: 1px solid #fca5a5;
    border-radius: 12px; padding: 10px 14px;
    font-size: 13px; color: #991b1b;
    max-width: 75%;
  }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="logo">ТД</div>
    <div class="header-text">
      <h1>AI Помощник по подшипникам</h1>
      <p>ТД «Эверест» · Вологда · 58 742 позиции в базе</p>
    </div>
    <div class="status" id="statusBadge">Онлайн</div>
  </header>

  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="icon">🔩</div>
      <h2>Спросите про любой подшипник</h2>
      <p>Аналоги, расшифровка обозначений, подбор по размерам, технические характеристики</p>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="sendQ(this.textContent)">Аналог 6205-2RS</button>
    <button class="suggestion" onclick="sendQ(this.textContent)">Что такое зазор C3?</button>
    <button class="suggestion" onclick="sendQ(this.textContent)">Расшифруй NU208 ECP</button>
    <button class="suggestion" onclick="sendQ(this.textContent)">Подшипник d=40 D=80</button>
    <button class="suggestion" onclick="sendQ(this.textContent)">Разница 2RS и ZZ</button>
    <button class="suggestion" onclick="sendQ(this.textContent)">SKF vs ГПЗ — в чём разница?</button>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="inp"
        rows="1"
        placeholder="Напишите вопрос... (Enter — отправить, Shift+Enter — перенос)"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
        maxlength="500"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="send()" title="Отправить">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
const API = '/api/ask';
const chat = document.getElementById('chat');
const inp = document.getElementById('inp');
const btn = document.getElementById('sendBtn');
let busy = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) { w.style.display = 'none'; }
  document.getElementById('suggestions').style.display = 'none';
}

function addMsg(text, role, sources) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  const av = document.createElement('div');
  av.className = `avatar ${role === 'user' ? 'user-av' : 'bot'}`;
  av.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;

  if (role === 'bot' && sources > 0) {
    const src = document.createElement('div');
    src.className = 'sources';
    src.innerHTML = `📦 Найдено в каталоге: ${sources} позиций`;
    bubble.appendChild(src);
  }

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar bot';
  av.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

async function send() {
  const q = inp.value.trim();
  if (!q || busy) return;
  busy = true;
  btn.disabled = true;
  inp.value = '';
  inp.style.height = 'auto';
  hideWelcome();
  addMsg(q, 'user');
  const t = addTyping();
  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    const j = await r.json();
    t.remove();
    if (j.ok) addMsg(j.answer, 'bot', j.sources || 0);
    else {
      const err = document.createElement('div');
      err.className = 'msg-wrap bot';
      err.innerHTML = `<div class="avatar bot">🤖</div><div class="error-msg">Ошибка: ${j.error}</div>`;
      chat.appendChild(err);
    }
  } catch (e) {
    t.remove();
    addMsg('Ошибка соединения. Попробуйте ещё раз.', 'bot', 0);
  }
  busy = false;
  btn.disabled = false;
  inp.focus();
  chat.scrollTop = chat.scrollHeight;
}

function sendQ(q) {
  inp.value = q;
  send();
}

// Check status on load
fetch('/api/ping').then(r => r.json()).then(d => {
  if (d.ok) {
    const s = document.getElementById('statusBadge');
    s.textContent = `58 742 позиции`;
  }
}).catch(() => {});

inp.focus();
</script>
</body>
</html>
