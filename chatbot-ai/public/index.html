<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Подшипник-бот — ТД Эверест</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-title">Подшипник-бот</div>
    <div class="app-sub">ТД «Эверест», Вологда</div>
    <button id="clear-btn" class="icon-btn" title="Очистить чат">Очистить</button>
  </header>

  <main id="chat" class="chat" aria-live="polite"></main>

  <footer class="composer">
    <form id="form" class="form">
      <textarea
        id="input"
        class="input"
        rows="1"
        placeholder="Напишите вопрос о подшипнике… (Enter — отправить, Shift+Enter — перенос)"
        autocomplete="off"
        required
      ></textarea>
      <button id="send" class="send-btn" type="submit" title="Отправить">
        <span class="send-label">Отправить</span>
      </button>
    </form>
    <div class="hint">История хранится только в этой вкладке — при перезагрузке страницы очистится.</div>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
