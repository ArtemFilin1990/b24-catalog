<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог Подшипников</title>
  <script src="//api.bitrix24.com/api/v1/"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
    }

    .status {
      margin: 0 0 16px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f1f5f9;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    .box {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      background: #fafafa;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Каталог Подшипников</h1>
      <div class="status" id="status">Инициализация...</div>

      <div class="grid">
        <div class="box">
          <div class="label">Состояние приложения</div>
          <pre id="appInfo">Загрузка...</pre>
        </div>
        <div class="box">
          <div class="label">Тест API</div>
          <pre id="apiInfo">Загрузка...</pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const appInfoEl = document.getElementById("appInfo");
    const apiInfoEl = document.getElementById("apiInfo");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function write(el, data) {
      try {
        el.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
      } catch (e) {
        el.textContent = String(data);
      }
    }

    async function loadApiPing() {
      try {
        const res = await fetch("/api/ping");
        const data = await res.json();
        write(apiInfoEl, data);
      } catch (e) {
        write(apiInfoEl, { error: e.message });
      }
    }

    if (typeof BX24 === "undefined") {
      setStatus("Ошибка: BX24.js не загрузился");
      write(appInfoEl, { error: "BX24 is undefined" });
      loadApiPing();
    } else {
      BX24.init(function () {
        setStatus("Приложение открыто внутри Bitrix24");

        try {
          BX24.resizeWindow(1200, 900);
        } catch (e) {}

        BX24.callMethod("app.info", {}, function (res) {
          if (res.error()) {
            write(appInfoEl, res.error());
            return;
          }
          write(appInfoEl, res.data());
        });

        loadApiPing();
      });
    }
  </script>
</body>
</html>
