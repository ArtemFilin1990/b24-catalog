<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Установка приложения</title>
  <script src="//api.bitrix24.com/api/v1/"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    .status {
      margin: 0 0 16px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f1f5f9;
      font-size: 14px;
    }

    button {
      padding: 12px 18px;
      border: 0;
      border-radius: 10px;
      background: #0b1014;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    pre {
      margin-top: 16px;
      padding: 16px;
      background: #0b1014;
      color: #d1fae5;
      border-radius: 10px;
      overflow: auto;
      min-height: 160px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Установка приложения Bitrix24</h1>
      <div class="status" id="status">Инициализация Bitrix24...</div>
      <button id="finishBtn" disabled>Завершить установку</button>
      <div class="hint">
        Эта страница должна открываться как URL первоначальной установки.
      </div>
      <pre id="log"></pre>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const finishBtn = document.getElementById("finishBtn");

    function log(message, data) {
      let line = message;
      if (typeof data !== "undefined") {
        try {
          line += " " + JSON.stringify(data, null, 2);
        } catch (e) {
          line += " " + String(data);
        }
      }
      logEl.textContent += line + "\n";
      console.log(message, data ?? "");
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    if (typeof BX24 === "undefined") {
      setStatus("Ошибка: BX24.js не загрузился");
      log("BX24 is undefined");
    } else {
      BX24.init(function () {
        setStatus("BX24.init OK");
        finishBtn.disabled = false;
        log("BX24.init OK");

        try {
          BX24.resizeWindow(980, 720);
        } catch (e) {
          log("BX24.resizeWindow error", e.message);
        }

        BX24.callMethod("app.info", {}, function (res) {
          if (res.error()) {
            log("app.info error", res.error());
            return;
          }
          log("app.info", res.data());
        });
      });
    }

    finishBtn.addEventListener("click", function () {
      setStatus("Завершение установки...");
      log("Calling BX24.installFinish()");

      try {
        BX24.installFinish();
        setStatus("Установка завершена. Теперь открой приложение заново.");
        log("installFinish called");
      } catch (e) {
        setStatus("Ошибка вызова installFinish");
        log("installFinish error", e.message);
      }
    });
  </script>
</body>
</html>
